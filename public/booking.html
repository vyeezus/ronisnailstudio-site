<!DOCTYPE html>
<html lang="en" class="page-booking">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Select Time Slot | Roni's Nail Studio</title>
    <meta name="description" content="Choose your preferred date and time for your custom nail service. Select from available slots.">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        .booking-page {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 2rem calc(4rem + env(safe-area-inset-bottom, 0px)) 2rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--text-muted);
            text-decoration: none;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.2s;
            margin-bottom: 2rem;
        }
        .back-link:hover { color: var(--text-accent); }
        .back-link::before { content: "←"; font-size: 1.1rem; }

        .selected-services {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .service-tag {
            font-family: var(--font-body);
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-accent);
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(178, 115, 154, 0.25);
            padding: 0.5rem 1.25rem;
            border-radius: 50px;
            letter-spacing: 0.5px;
        }

        /* Calendar */
        .calendar-section { margin-bottom: 2.5rem; position: relative; }
        .calendar-loading-panel {
            margin-bottom: 0.5rem;
        }
        .calendar-loading-panel .calendar-loading-text {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            font-family: var(--font-body);
            font-size: 0.88rem;
            color: var(--text-muted);
            margin: 0 0 0.75rem 0;
        }
        .calendar-loading-panel .calendar-loading-text .spinner {
            flex-shrink: 0;
        }
        .cal-skeleton-block {
            height: 220px;
            border-radius: 12px;
            background: linear-gradient(
                110deg,
                rgba(178, 115, 154, 0.07) 0%,
                rgba(178, 115, 154, 0.14) 40%,
                rgba(178, 115, 154, 0.07) 80%
            );
            background-size: 200% 100%;
            animation: cal-shimmer 1.3s ease-in-out infinite;
        }
        @keyframes cal-shimmer {
            0% { background-position: 100% 0; }
            100% { background-position: -100% 0; }
        }

        /* Match index glassmorphism */
        .form-section {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 32px;
            padding: 3.5rem 3rem;
            box-shadow: 0 15px 40px rgba(119, 78, 120, 0.05);
        }
        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .cal-header h3 {
            font-family: var(--font-heading);
            font-size: 1.1rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-main);
        }

        .cal-nav {
            background: none;
            border: 1px solid rgba(178, 115, 154, 0.2);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .cal-nav:hover {
            background: rgba(255,255,255,0.5);
            color: var(--text-accent);
            border-color: var(--text-accent);
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }

        .cal-day-label {
            font-family: var(--font-body);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            padding: 0.5rem 0;
        }

        .cal-day {
            font-family: var(--font-body);
            font-size: 0.9rem;
            padding: 0.6rem 0;
            border-radius: 12px;
            border: none;
            background: transparent;
            color: var(--text-main);
            cursor: default;
            transition: all 0.2s;
        }

        .cal-day.available {
            cursor: pointer;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.4);
        }
        .cal-day.available:hover {
            background: rgba(178, 115, 154, 0.15);
            transform: scale(1.05);
        }

        .cal-day.selected {
            background: var(--text-accent) !important;
            color: #fff !important;
            font-weight: 600;
        }

        .cal-day.past, .cal-day.empty {
            color: rgba(0,0,0,0.15);
        }

        .cal-day.unavailable {
            color: rgba(0,0,0,0.2);
            text-decoration: line-through;
            cursor: not-allowed;
        }

        .cal-day.today {
            border: 1px solid var(--text-accent);
        }

        .slots-section {
            margin-bottom: 2.5rem;
            scroll-margin-top: 2rem;
        }

        #booking-flow {
            min-height: 250px; /* Reduced for better initial layout */
            scroll-margin-top: 2rem;
        }

        .slots-label {
            font-family: var(--font-heading);
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-accent);
            margin-bottom: 1rem;
        }

        .slots-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .slot-pill {
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 400;
            padding: 0.65rem 1.5rem;
            border-radius: 50px;
            border: 1px solid rgba(178, 115, 154, 0.2);
            background: rgba(255, 255, 255, 0.35);
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.25s;
        }
        .slot-pill:hover {
            background: rgba(178, 115, 154, 0.12);
            border-color: var(--text-accent);
        }
        .slot-pill.selected {
            background: var(--text-accent);
            color: #fff;
            border-color: var(--text-accent);
            font-weight: 600;
        }

        .slots-empty {
            font-family: var(--font-body);
            font-size: 0.9rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .slots-loading {
            font-family: var(--font-body);
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        /* Customer Form */
        .customer-form { margin-top: 1rem; }

        .form-field {
            margin-bottom: 1.25rem;
        }

        .form-field label {
            display: block;
            font-family: var(--font-body);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .form-field input {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1px solid rgba(178, 115, 154, 0.15);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.5);
            font-family: var(--font-body);
            /* 16px minimum: iOS Safari stops auto-zoom on focus; avoids “zoomed in” success view */
            font-size: max(16px, 0.95rem);
            color: var(--text-main);
            transition: all 0.3s;
        }
        .form-field input:focus {
            outline: none;
            border-color: var(--text-accent);
            box-shadow: 0 0 0 3px rgba(178, 115, 154, 0.1);
            background: rgba(255, 255, 255, 0.8);
        }
        .form-field input::placeholder {
            color: rgba(0,0,0,0.25);
        }

        /* Success / Error states */
        .cal-day.available,
        .cal-nav,
        .slot-pill:not(:disabled),
        #confirm-btn {
            touch-action: manipulation;
        }

        .booking-success {
            text-align: center;
            padding: 3rem 2rem;
            /* After iOS zoom, avoid inherited scale feeling “stuck” */
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }
        .booking-success .check-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--text-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            font-size: 1.8rem;
            color: #fff;
        }
        .booking-success h3 {
            font-family: var(--font-heading);
            font-size: 1.4rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 1rem;
            color: var(--text-main);
        }
        .booking-success p {
            font-family: var(--font-body);
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .booking-error {
            background: rgba(183, 94, 122, 0.08);
            border-left: 3px solid #b75e7a;
            padding: 1rem 1.25rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            font-family: var(--font-body);
            font-size: 0.85rem;
            color: #b75e7a;
        }
        
        .summary-info-lite {
            font-family: var(--font-body);
            font-size: 0.9rem;
            color: var(--text-main);
            margin-top: 1.5rem;
            display: flex;
            gap: 2rem;
            border-top: 1px solid var(--border-line);
            padding-top: 1rem;
        }
        .summary-info-lite p { margin: 0; }
        .summary-info-lite strong { color: var(--text-accent); }

        @media (max-width: 600px) {
            html { font-size: 15px; }
            .booking-page { padding: 0 1.25rem 3rem 1.25rem; }
            .form-section { padding: 2.25rem 1.5rem !important; }
            .cal-day { font-size: 0.8rem; padding: 0.5rem 0; }
            .slot-pill { padding: 0.5rem 1rem; font-size: 0.8rem; }
            .hero { padding-top: 4rem; padding-bottom: 2rem; }
            h1 { font-size: 2.2rem !important; }
        }
        @media (max-width: 480px) {
            html { font-size: 14px; }
        }
    </style>
</head>
<body class="page-booking">
    <div class="background-texture"></div>
    <div class="background-overlay"></div>
    
    <header class="hero">
        <div class="title-wrapper">
            <h1>Roni's Nail Studio</h1>
        </div>
    </header>

    <div class="booking-page">
        <a href="index.html" class="back-link">Back to Services</a>

        <!-- Your Selections -->
        <div class="form-section" style="margin-bottom: 2.5rem;">
            <h2>Your Selections</h2>
            <div id="selected-services" class="selected-services"></div>
        </div>

        <!-- Main Booking Card -->
        <div id="booking-flow" class="form-section">
            
            <!-- Calendar -->
            <div class="calendar-section">
                <div class="cal-header">
                    <button class="cal-nav" id="cal-prev">‹</button>
                    <h3 id="cal-month-label"></h3>
                    <button class="cal-nav" id="cal-next">›</button>
                </div>
                <div id="calendar-loading" class="calendar-loading-panel" role="status" aria-live="polite">
                    <p class="calendar-loading-text">
                        <span class="spinner" aria-hidden="true"></span>
                        Loading available dates…
                    </p>
                    <div class="cal-skeleton-block" aria-hidden="true"></div>
                </div>
                <div class="cal-grid" id="cal-grid"></div>
            </div>

            <!-- Time Slots -->
            <div class="slots-section" id="slots-section" style="display: none;">
                <p class="slots-label" id="slots-date-label"></p>
                <div id="slots-container"></div>
            </div>

            <!-- Customer Info -->
            <div id="customer-section" style="display: none;">
                <hr style="margin: 2rem 0;">
                <h2 style="font-size: 1.1rem; margin-bottom: 0.5rem;">Your Info</h2>
                <div id="slot-preview" style="font-family: var(--font-body); font-size: 0.85rem; color: var(--text-accent); margin-bottom: 1.5rem; letter-spacing: 0.5px;"></div>
                <div class="customer-form">
                    <div class="form-field">
                        <label>Full Name *</label>
                        <input type="text" id="cust-name" placeholder="Jane Doe" required>
                    </div>
                    <div class="form-field">
                        <label>Phone</label>
                        <input type="tel" id="cust-phone" placeholder="(555) 123-4567">
                    </div>
                    <div class="form-field">
                        <label>Email</label>
                        <input type="email" id="cust-email" placeholder="jane@email.com">
                    </div>
                    <div id="book-error"></div>
                    <button id="confirm-btn" class="cute-btn" disabled>Submit Request</button>
                </div>
            </div>
        </div>

        <!-- Success State (hidden by default) -->
        <div id="booking-success" class="form-section booking-success" style="display: none;">
            <div class="check-circle">✓</div>
            <h3>Request Submitted</h3>
            <p id="success-message" style="display: none;"></p>
            <div style="margin: 2rem 0; padding: 1.5rem; background: rgba(178, 115, 154, 0.05); border-radius: 16px;">
                <p style="font-size: 0.95rem; line-height: 1.5; color: var(--text-main); font-weight: 500; margin: 0;">Next steps: if you have inspo pics please DM them to me on instagram @ronisnailstudio</p>
            </div>
            <a href="index.html" class="cute-btn" style="display: inline-block; text-decoration: none; padding: 1rem 2.5rem;">Back to Home</a>
        </div>
    <script src="booking-v3.js?v=mobile_booking_v9"></script>
</body>
</html>
