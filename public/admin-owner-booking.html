<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.png" type="image/png">
    <meta name="robots" content="noindex, nofollow">
    <title>Book client (admin) | Roni's Nail Studio</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        .admin-book-page { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
        .admin-book-layout { display: flex; flex-direction: column; gap: 1.35rem; }
        .admin-book-heading { max-width: 520px; width: 100%; margin: 0 auto; }
        .admin-book-form { max-width: 520px; width: 100%; margin: 0 auto; }
        .admin-book-cal-aside { width: 100%; max-width: 520px; margin: 0 auto; }
        .cal-embed-label {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            margin-bottom: 0.45rem;
        }
        .cal-embed-hint { font-size: 0.78rem; color: var(--text-muted); margin: 0.5rem 0 0; line-height: 1.45; }
        /* Google embed has no font-size API; scale the iframe so event titles/times read smaller and more fits in view. Tweak 0.82–0.92 if needed. */
        .admin-cal-frame-wrap {
            --admin-cal-embed-scale: 0.86;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(178, 115, 154, 0.2);
            background: rgba(255, 255, 255, 0.55);
            height: min(52vh, 520px);
            min-height: 320px;
        }
        .admin-cal-scale-inner {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }
        .admin-cal-scale-inner iframe {
            position: absolute;
            left: 0;
            top: 0;
            width: calc(100% / var(--admin-cal-embed-scale));
            height: calc(100% / var(--admin-cal-embed-scale));
            border: 0;
            transform: scale(var(--admin-cal-embed-scale));
            transform-origin: 0 0;
        }
        @media (min-width: 960px) {
            .admin-book-layout {
                display: grid;
                grid-template-columns: minmax(0, 1fr) minmax(300px, 400px);
                grid-template-rows: auto 1fr;
                gap: 1.25rem 1.75rem;
                align-items: start;
            }
            .admin-book-heading { grid-column: 1; grid-row: 1; margin: 0; max-width: none; }
            .admin-book-form { grid-column: 1; grid-row: 2; margin: 0; max-width: none; }
            .admin-book-cal-aside {
                grid-column: 2;
                grid-row: 1 / 3;
                margin: 0;
                max-width: none;
                position: sticky;
                top: 0.75rem;
            }
            .admin-cal-frame-wrap {
                height: min(70vh, 640px);
                min-height: 420px;
            }
        }
        .admin-book-page h1 { font-family: var(--font-heading); font-weight: 400; font-size: 1.35rem; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.75rem; color: var(--text-main); text-align: center; }
        .admin-nav { text-align: center; margin-bottom: 1.35rem; font-size: 0.88rem; }
        .admin-nav a { color: var(--text-accent); text-decoration: none; font-weight: 500; }
        .admin-nav a:hover { text-decoration: underline; }
        .admin-book-page label { display: block; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); margin-bottom: 0.35rem; }
        .admin-book-page input[type="password"], .admin-book-page input[type="text"], .admin-book-page input[type="email"], .admin-book-page input[type="tel"], .admin-book-page input[type="date"], .admin-book-page input[type="number"], .admin-book-page textarea {
            width: 100%;
            max-width: 100%;
            min-width: 0;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(178, 115, 154, 0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.55);
            font-family: var(--font-body);
            font-size: 1rem;
            margin-bottom: 0.9rem;
            box-sizing: border-box;
        }
        .admin-book-page textarea { min-height: 4rem; resize: vertical; }
        .admin-book-page input:focus, .admin-book-page textarea:focus { outline: none; border-color: var(--text-accent); }
        .secret-block { margin-bottom: 1.25rem; }
        .lookup-block { margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(178, 115, 154, 0.12); }
        .match-list { list-style: none; margin: 0.5rem 0 0; padding: 0; max-height: 220px; overflow-y: auto; }
        .match-list li { margin-bottom: 0.45rem; }
        .match-list button {
            width: 100%; text-align: left; padding: 0.65rem 0.85rem; border: 1px solid rgba(178, 115, 154, 0.2); border-radius: 10px; background: rgba(255,255,255,0.7); cursor: pointer; font-family: var(--font-body); font-size: 0.88rem; color: var(--text-main);
        }
        .match-list button:hover { border-color: var(--text-accent); background: #fff; }
        .match-list .meta { display: block; font-size: 0.78rem; color: var(--text-muted); margin-top: 0.2rem; }
        .remember { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; font-size: 0.85rem; color: var(--text-muted); }
        .remember input { width: auto; }
        .btn-row { display: flex; flex-wrap: wrap; gap: 0.65rem; margin-top: 1.25rem; }
        .admin-book-page .cute-btn { flex: 1; min-width: 140px; border: none; cursor: pointer; font-family: var(--font-body); }
        .admin-book-page .cute-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .admin-book-page .input-date-wrap { margin-bottom: 0.9rem; max-width: 100%; }
        .admin-book-page .input-date-wrap input[type="date"] { margin-bottom: 0; }
        .msg { padding: 1rem; border-radius: 10px; font-size: 0.9rem; margin-bottom: 1rem; display: none; }
        .msg.err { display: block; background: rgba(183, 94, 122, 0.1); color: #8b3a52; border: 1px solid rgba(183, 94, 122, 0.25); }
        .msg.ok { display: block; background: rgba(100, 140, 100, 0.12); color: #2d5a2d; border: 1px solid rgba(100, 140, 100, 0.25); }
        .lookup-hint { font-size: 0.8rem; color: var(--text-muted); margin-top: -0.5rem; margin-bottom: 0.75rem; }
        .lookup-status {
            display: none;
            align-items: center;
            gap: 0.55rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0.25rem 0 0.65rem;
            min-height: 1.5rem;
        }
        .lookup-status.visible { display: flex; }
        .lookup-status .spinner-mini {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            border: 2px solid rgba(178, 115, 154, 0.25);
            border-top-color: var(--text-accent);
            border-radius: 50%;
            animation: owner-admin-spin 0.65s linear infinite;
        }
        @keyframes owner-admin-spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="background-texture"></div>
    <div class="background-overlay"></div>
    <header class="hero">
        <div class="title-wrapper">
            <h1>Roni's Nail Studio</h1>
        </div>
    </header>
    <main class="container">
        <div class="form-section admin-book-page">
            <div class="admin-book-layout">
            <div class="admin-book-heading">
            <h1>Book a client</h1>
            <p class="admin-nav"><a href="admin-studio-hours.html">Edit studio hours</a> · <a href="index.html">Home</a></p>
            </div>
            <aside class="admin-book-cal-aside" aria-label="Google calendars">
                <span class="cal-embed-label">Calendars</span>
                <div class="admin-cal-frame-wrap">
                    <div class="admin-cal-scale-inner">
                        <iframe id="admin-cal-embed" title="Studio and personal Google calendars"></iframe>
                    </div>
                </div>
                <p class="cal-embed-hint">Sign in to Google in this browser if the calendar is blank.</p>
            </aside>
            <div class="admin-book-form">
            <div id="msg" class="msg" role="status"></div>
            <div class="secret-block">
                <label for="admin-secret">Admin secret</label>
                <input type="password" id="admin-secret" autocomplete="current-password" placeholder="Your BOOKING_ADMIN_SECRET">
                <label class="remember">
                    <input type="checkbox" id="remember-secret">
                    Remember on this browser (stays after closing — uncheck to clear)
                </label>
            </div>
            <div class="lookup-block">
                <label for="lookup-name">Find in CRM (type name)</label>
                <input type="text" id="lookup-name" autocomplete="off" placeholder="e.g. Sarah" aria-autocomplete="list" aria-controls="match-list">
                <p class="lookup-hint">Matches names in your Bookings sheet. Pick a row to fill contact fields. New clients: skip and type everything below.</p>
                <div id="lookup-status" class="lookup-status" role="status" aria-live="polite"></div>
                <ul id="match-list" class="match-list" aria-live="polite"></ul>
            </div>
            <label for="client-name">Client name</label>
            <input type="text" id="client-name" required autocomplete="name">
            <label for="client-phone">Phone</label>
            <input type="tel" id="client-phone" autocomplete="tel">
            <label for="client-email">Email</label>
            <input type="email" id="client-email" required autocomplete="email">
            <label for="service">Service description</label>
            <textarea id="service" required placeholder="e.g. Structured Gel refill + Tier 2 art"></textarea>
            <label for="appt-date">Date</label>
            <div class="input-date-wrap">
                <input type="date" id="appt-date" required>
            </div>
            <label for="appt-time">Time</label>
            <input type="text" id="appt-time" required placeholder="2:30 PM">
            <label for="duration">Duration (minutes)</label>
            <input type="number" id="duration" min="15" max="480" step="15" value="60">
            <div class="btn-row">
                <button type="button" class="cute-btn" id="btn-submit">Create booking &amp; send email</button>
            </div>
            </div>
            </div>
        </div>
    </main>
    <script>
        (function () {
            var PROXY = window.location.origin + '/api/booking';
            var STORAGE_KEY = 'booking_admin_secret';

            /** Keep in sync with CALENDAR_ID and PERSONAL_CALENDAR_ID in google_apps_script.js */
            var ADMIN_CALENDAR_EMBED_IDS = [
                'f9c38dc209bf435115238aba24b24be51b7e4e2f05f3e3f9c08b9077a78c33b3@group.calendar.google.com',
                'nguyenveronica0108@gmail.com',
            ];
            (function initAdminCalEmbed() {
                var iframe = document.getElementById('admin-cal-embed');
                if (!iframe) return;
                var ids = ADMIN_CALENDAR_EMBED_IDS.filter(function (id) {
                    return id && String(id).trim();
                });
                if (!ids.length) return;
                var ctz =
                    (typeof Intl !== 'undefined' &&
                        Intl.DateTimeFormat &&
                        Intl.DateTimeFormat().resolvedOptions().timeZone) ||
                    'America/Chicago';
                var q = new URLSearchParams();
                q.set('ctz', ctz);
                q.set('mode', 'WEEK');
                ids.forEach(function (id) {
                    q.append('src', String(id).trim());
                });
                iframe.setAttribute('referrerpolicy', 'no-referrer-when-downgrade');
                iframe.setAttribute('loading', 'lazy');
                iframe.src = 'https://calendar.google.com/calendar/embed?' + q.toString();
            })();

            var msg = document.getElementById('msg');
            var secretInput = document.getElementById('admin-secret');
            var rememberCb = document.getElementById('remember-secret');
            var lookupName = document.getElementById('lookup-name');
            var matchList = document.getElementById('match-list');
            var clientName = document.getElementById('client-name');
            var clientPhone = document.getElementById('client-phone');
            var clientEmail = document.getElementById('client-email');
            var service = document.getElementById('service');
            var apptDate = document.getElementById('appt-date');
            var apptTime = document.getElementById('appt-time');
            var duration = document.getElementById('duration');
            var btnSubmit = document.getElementById('btn-submit');

            try {
                var saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    secretInput.value = saved;
                    rememberCb.checked = true;
                }
            } catch (e) { /* ignore */ }

            rememberCb.addEventListener('change', function () {
                try {
                    if (!rememberCb.checked) localStorage.removeItem(STORAGE_KEY);
                } catch (e) { /* ignore */ }
            });

            function clearMsg() {
                msg.className = 'msg';
                msg.textContent = '';
            }
            function setMsg(ok, text) {
                msg.className = 'msg ' + (ok ? 'ok' : 'err');
                msg.textContent = text;
            }

            function escapeHtml(s) {
                var d = document.createElement('div');
                d.textContent = s == null ? '' : String(s);
                return d.innerHTML;
            }

            var lookupTimer = null;
            var lookupReqId = 0;
            var lookupStatus = document.getElementById('lookup-status');

            /** @param {{ noSpinner?: boolean }} [opts] */
            function setLookupLoading(on, text, opts) {
                opts = opts || {};
                if (!lookupStatus) return;
                if (on) {
                    lookupStatus.classList.add('visible');
                    if (opts.noSpinner) {
                        lookupStatus.innerHTML = '<span>' + escapeHtml(text || '') + '</span>';
                    } else {
                        lookupStatus.innerHTML =
                            '<span class="spinner-mini" aria-hidden="true"></span><span>' + escapeHtml(text || 'Searching…') + '</span>';
                    }
                } else {
                    lookupStatus.classList.remove('visible');
                    lookupStatus.innerHTML = '';
                }
            }

            function runLookup() {
                var secret = secretInput.value.trim();
                var q = lookupName.value.trim();
                matchList.innerHTML = '';
                if (!secret || q.length < 2) {
                    setLookupLoading(false);
                    return;
                }

                var reqId = ++lookupReqId;
                setLookupLoading(true, 'Searching…');

                fetch(PROXY, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        ownerLookupClient: true,
                        adminSecret: secret,
                        query: q,
                    }),
                })
                    .then(function (r) {
                        return r.json();
                    })
                    .then(function (data) {
                        if (reqId !== lookupReqId) return;
                        matchList.innerHTML = '';
                        if (!data || data.status !== 'success') {
                            if (data && data.message === 'unauthorized') setMsg(false, 'Wrong admin secret.');
                            return;
                        }
                        try {
                            if (rememberCb.checked && secretInput.value.trim()) {
                                localStorage.setItem(STORAGE_KEY, secretInput.value.trim());
                            }
                        } catch (e) { /* ignore */ }
                        var list = data.matches || [];
                        if (list.length === 0) {
                            setLookupLoading(true, 'No matches in Bookings for that search.', { noSpinner: true });
                            setTimeout(function () {
                                if (reqId === lookupReqId) setLookupLoading(false);
                            }, 1200);
                            return;
                        }
                        setLookupLoading(false);
                        list.forEach(function (m) {
                            var li = document.createElement('li');
                            var btn = document.createElement('button');
                            btn.type = 'button';
                            btn.innerHTML =
                                '<strong>' +
                                escapeHtml(m.name) +
                                '</strong><span class="meta">' +
                                escapeHtml(m.email || '—') +
                                (m.phone ? ' · ' + escapeHtml(m.phone) : '') +
                                (m.lastBooked ? ' · Last booking: ' + escapeHtml(m.lastBooked) : '') +
                                '</span>';
                            btn.addEventListener('click', function () {
                                clientName.value = m.name || '';
                                clientPhone.value = m.phone || '';
                                clientEmail.value = m.email || '';
                                matchList.innerHTML = '';
                                lookupName.value = '';
                                setLookupLoading(false);
                                clearMsg();
                            });
                            li.appendChild(btn);
                            matchList.appendChild(li);
                        });
                    })
                    .catch(function () {
                        if (reqId !== lookupReqId) return;
                        matchList.innerHTML = '';
                    })
                    .finally(function () {
                        if (reqId === lookupReqId) {
                            if (lookupStatus && lookupStatus.textContent.indexOf('Searching') >= 0) {
                                setLookupLoading(false);
                            }
                        }
                    });
            }

            lookupName.addEventListener('input', function () {
                clearMsg();
                if (lookupTimer) clearTimeout(lookupTimer);
                matchList.innerHTML = '';
                var q = lookupName.value.trim();
                if (q.length < 2) {
                    setLookupLoading(false);
                    return;
                }
                lookupTimer = setTimeout(runLookup, 400);
            });

            btnSubmit.addEventListener('click', function () {
                clearMsg();
                var secret = secretInput.value.trim();
                if (!secret) {
                    setMsg(false, 'Enter your admin secret.');
                    return;
                }
                var name = clientName.value.trim();
                var phone = clientPhone.value.trim();
                var email = clientEmail.value.trim();
                var svc = service.value.trim();
                var d = apptDate.value;
                var t = apptTime.value.trim();
                var dur = parseInt(duration.value, 10);
                if (!name || !email || !svc || !d || !t) {
                    setMsg(false, 'Fill name, email, service, date, and time.');
                    return;
                }
                if (isNaN(dur) || dur < 15) dur = 60;

                try {
                    if (rememberCb.checked) localStorage.setItem(STORAGE_KEY, secret);
                    else localStorage.removeItem(STORAGE_KEY);
                } catch (e) { /* ignore */ }

                btnSubmit.disabled = true;
                fetch(PROXY, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        ownerDirectBooking: true,
                        adminSecret: secret,
                        clientName: name,
                        phone: phone,
                        email: email,
                        service: svc,
                        date: d,
                        time: t,
                        durationMinutes: dur,
                    }),
                })
                    .then(function (r) {
                        return r.text().then(function (text) {
                            try {
                                return JSON.parse(text);
                            } catch (e) {
                                return { status: 'error', message: text };
                            }
                        });
                    })
                    .then(function (data) {
                        if (data && data.status === 'success') {
                            setMsg(true, 'Booked. Client confirmation sent. You should get a copy at the studio inbox.');
                            service.value = '';
                            apptTime.value = '';
                        } else if (data && data.message === 'unauthorized') {
                            setMsg(false, 'Wrong admin secret.');
                        } else if (data && data.message === 'bad_datetime') {
                            setMsg(false, 'Check date and time (use a format like 2:30 PM).');
                        } else {
                            setMsg(false, (data && data.message) || 'Request failed. Deploy latest Apps Script and try again.');
                        }
                    })
                    .catch(function () {
                        setMsg(false, 'Network error.');
                    })
                    .finally(function () {
                        btnSubmit.disabled = false;
                    });
            });
        })();
    </script>
</body>
</html>
